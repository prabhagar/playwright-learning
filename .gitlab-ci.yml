test_mobile:
  stage: test
  image: node:20
  dependencies:
    - install_dependencies
  script:
    - npm test -- --project='Mobile Chrome'
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 30 days
  retry:
    max: 2
    when: runner_system_failure
  allow_failure: false

publish_report:
  stage: report
  image: node:20
  script:
    - echo "Test Report available in artifacts"
  artifacts:
    paths:
      - playwright-report/
    expire_in: 90 days
  only:
    - main
    - develop
