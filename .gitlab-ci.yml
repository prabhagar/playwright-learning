stages:
  - install
  - test
  - report

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  paths:
    - .npm
    - node_modules/

install_dependencies:
  stage: install
  image: node:20
  script:
    - npm ci
    - npx playwright install --with-deps
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 day

test_chromium:
  stage: test
  image: node:20
  dependencies:
    - install_dependencies
  script:
    - npm test -- --project=chromium
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    reports:
      junit: test-results/results.xml
    expire_in: 30 days
  retry:
    max: 2
    when: runner_system_failure
  allow_failure: false

test_firefox:
  stage: test
  image: node:20
  dependencies:
    - install_dependencies
  script:
    - npm test -- --project=firefox
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 30 days
  retry:
    max: 2
    when: runner_system_failure
  allow_failure: false

test_webkit:
  stage: test
  image: node:20
  dependencies:
    - install_dependencies
  script:
    - npm test -- --project=webkit
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 30 days
